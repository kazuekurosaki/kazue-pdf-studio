<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kazue Studio - Ultimate Novel Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .novel-font { font-family: 'Crimson Pro', serif; }
        .block-card:hover .btn-del { opacity: 1; }
        .loading-screen { display: none; background: rgba(0,0,0,0.9); position: fixed; inset: 0; z-index: 9999; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">

    <!-- Loading Overlay -->
    <div id="loader" class="loading-screen">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-500 mb-4"></div>
        <p class="text-blue-400 font-bold tracking-widest animate-pulse">KAZUE STUDIO: PROCESSING...</p>
    </div>

    <div class="max-w-7xl mx-auto p-4 lg:p-10">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
            <div class="text-center md:text-left">
                <h1 class="text-5xl font-black text-white tracking-tighter italic">KAZUE <span class="text-blue-600">STUDIO</span></h1>
                <p class="text-slate-500 mt-1 uppercase text-[10px] font-bold tracking-[0.3em]">Adaptive & Optimized Publishing</p>
            </div>
            <div class="flex gap-4">
                <button onclick="generatePDF()" class="bg-blue-600 hover:bg-blue-500 text-white font-black px-10 py-4 rounded-2xl shadow-[0_10px_30px_rgba(37,99,235,0.3)] transition transform active:scale-95">
                    GENERATE PDF
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            
            <!-- PANEL KIRI: KONFIGURASI -->
            <div class="lg:col-span-4 space-y-6">
                
                <!-- Cover Section -->
                <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-2xl">
                    <h2 class="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-4">Front Cover (Adaptive Page)</h2>
                    <div id="coverPreview" class="hidden mb-4 relative rounded-2xl overflow-hidden border border-slate-700 shadow-2xl">
                        <img id="imgCover" src="#" class="w-full h-auto">
                        <button onclick="removeCover()" class="absolute top-3 right-3 bg-red-600/80 backdrop-blur-md text-white w-8 h-8 rounded-full font-bold">×</button>
                    </div>
                    <label class="flex flex-col items-center justify-center w-full h-36 border-2 border-dashed border-slate-800 rounded-3xl cursor-pointer hover:bg-slate-800 transition" id="coverLabel">
                        <span class="text-3xl mb-2">🖼️</span>
                        <p class="text-[10px] font-black text-slate-500 uppercase">Upload Cover Utama</p>
                        <input type="file" id="coverInput" class="hidden" accept="image/*" onchange="handleFile(event, 'cover')" />
                    </label>
                </div>

                <!-- Metadata Section -->
                <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-2xl space-y-3">
                    <h2 class="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-2">Book Information</h2>
                    <input type="text" id="title" placeholder="Judul Novel" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl outline-none focus:border-blue-500 text-sm">
                    <input type="text" id="author" placeholder="Nama Penulis" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl outline-none focus:border-blue-500 text-sm">
                    <input type="text" id="illustrator" placeholder="Ilustrator" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl outline-none focus:border-blue-500 text-sm">
                    <input type="text" id="translator" placeholder="Penerjemah" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl outline-none focus:border-blue-500 text-sm">
                    <textarea id="synopsis" rows="4" placeholder="Sinopsis / Deskripsi..." class="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl outline-none focus:border-blue-500 text-sm resize-none"></textarea>
                </div>

                <!-- Toolbox Section -->
                <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-2xl">
                    <h2 class="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-4">Add Content Blocks</h2>
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <button onclick="addBlock('header')" class="bg-slate-100 text-slate-950 p-4 rounded-2xl hover:bg-white transition text-xs font-black uppercase">Judul Bab</button>
                        <button onclick="addBlock('text')" class="bg-blue-600 text-white p-4 rounded-2xl hover:bg-blue-500 transition text-xs font-black uppercase">Paragraf</button>
                        <button onclick="document.getElementById('bulkImg').click()" class="col-span-2 border-2 border-slate-800 p-4 rounded-2xl hover:bg-slate-800 transition text-xs font-black uppercase">+ Upload Banyak Ilustrasi</button>
                        <input type="file" id="bulkImg" multiple accept="image/*" class="hidden" onchange="handleFile(event, 'bulk')">
                    </div>
                    <div class="flex gap-2">
                        <input type="text" id="urlInput" placeholder="URL Gambar..." class="flex-1 bg-slate-950 border border-slate-800 p-3 rounded-xl outline-none text-[10px]">
                        <button onclick="addImageFromUrl()" class="bg-slate-800 px-4 rounded-xl text-[10px] font-bold">ADD URL</button>
                    </div>
                </div>
            </div>

            <!-- PANEL KANAN: EDITOR -->
            <div class="lg:col-span-8">
                <div class="bg-slate-900 min-h-[800px] rounded-[3rem] border border-slate-800 shadow-2xl p-6 lg:p-12">
                    <div class="flex justify-between items-center mb-10 border-b border-slate-800 pb-6">
                        <h2 class="text-2xl font-black italic">Draft Canvas</h2>
                        <span id="counter" class="text-[10px] font-black bg-blue-600/10 text-blue-500 px-4 py-2 rounded-full border border-blue-500/20 tracking-widest uppercase">0 Blocks</span>
                    </div>
                    <div id="editorSpace" class="space-y-6">
                        <div id="emptyState" class="text-center py-40 opacity-20"><p class="text-8xl mb-4">🖋️</p><p class="font-bold uppercase tracking-widest">Kazue Studio Ready</p></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { jsPDF } = window.jspdf;
        let coverBase64 = null;
        let blocks = [];

        // MODUL 1: KOMPRESI GAMBAR (UKURAN FILE OPTIMIZED)
        async function compressImage(base64Str, maxWidth = 1600) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    if (width > maxWidth || height > maxWidth) {
                        const ratio = Math.min(maxWidth / width, maxWidth / height);
                        width *= ratio;
                        height *= ratio;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.75)); // Kompresi kualitas 75%
                };
            });
        }

        // MODUL 2: HANDLER FILE & URL
        async function handleFile(e, mode) {
            const files = Array.from(e.target.files);
            document.getElementById('loader').style.display = 'flex';
            for (const file of files) {
                const base64 = await new Promise(res => {
                    const reader = new FileReader();
                    reader.onload = (ev) => res(ev.target.result);
                    reader.readAsDataURL(file);
                });
                const compressed = await compressImage(base64);
                if (mode === 'cover') {
                    coverBase64 = compressed;
                    document.getElementById('imgCover').src = compressed;
                    document.getElementById('coverPreview').classList.remove('hidden');
                    document.getElementById('coverLabel').classList.add('hidden');
                } else {
                    blocks.push({ id: Date.now() + Math.random(), type: 'image', value: compressed });
                }
            }
            render();
            document.getElementById('loader').style.display = 'none';
        }

        async function addImageFromUrl() {
            const url = document.getElementById('urlInput').value;
            if (!url) return;
            try {
                document.getElementById('loader').style.display = 'flex';
                const res = await fetch(url);
                const blob = await res.blob();
                const base64 = await new Promise(res => {
                    const reader = new FileReader();
                    reader.onloadend = () => res(reader.result);
                    reader.readAsDataURL(blob);
                });
                const compressed = await compressImage(base64);
                blocks.push({ id: Date.now() + Math.random(), type: 'image', value: compressed });
                render();
                document.getElementById('urlInput').value = '';
            } catch (e) {
                alert("CORS Blocked. Gagal mengambil gambar dari URL ini.");
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function removeCover() {
            coverBase64 = null;
            document.getElementById('coverPreview').classList.add('hidden');
            document.getElementById('coverLabel').classList.remove('hidden');
        }

        function addBlock(type) {
            blocks.push({ id: Date.now() + Math.random(), type, value: "" });
            render();
        }

        function updateBlock(id, val) {
            const idx = blocks.findIndex(b => b.id === id);
            blocks[idx].value = val;
        }

        function deleteBlock(id) {
            blocks = blocks.filter(b => b.id !== id);
            render();
        }

        // MODUL 3: RENDER EDITOR
        function render() {
            const space = document.getElementById('editorSpace');
            const empty = document.getElementById('emptyState');
            const counter = document.getElementById('counter');
            space.innerHTML = '';
            empty.style.display = blocks.length ? 'none' : 'block';
            counter.innerText = `${blocks.length} BLOCKS`;

            blocks.forEach((b, i) => {
                const div = document.createElement('div');
                div.className = "block-card relative bg-slate-950/50 p-6 rounded-3xl border border-slate-800 transition hover:border-slate-600";
                let input = b.type === 'header' ? 
                    `<input type="text" class="w-full bg-transparent font-black text-2xl outline-none uppercase text-white" value="${b.value}" oninput="updateBlock(${b.id}, this.value)" placeholder="JUDUL BAB...">` :
                    b.type === 'text' ? 
                    `<textarea class="w-full bg-transparent novel-font text-lg outline-none resize-none text-slate-300 leading-relaxed" rows="5" oninput="updateBlock(${b.id}, this.value)" placeholder="Tulis cerita di sini...">${b.value}</textarea>` :
                    `<div class="text-center"><img src="${b.value}" class="max-h-80 rounded-2xl mx-auto shadow-2xl border border-slate-800 mb-2"><p class="text-[8px] font-bold text-blue-500 uppercase tracking-[0.2em]">Adaptive Image Page</p></div>`;
                
                div.innerHTML = `
                    <div class="flex justify-between mb-4 border-b border-slate-800/50 pb-2">
                        <span class="text-[10px] font-black text-slate-700 uppercase tracking-widest">#${i+1} - ${b.type}</span>
                        <button onclick="deleteBlock(${b.id})" class="btn-del opacity-0 text-red-500 font-bold text-[10px] uppercase transition">Delete</button>
                    </div>${input}`;
                space.appendChild(div);
            });
        }

        // MODUL 4: PDF GENERATOR ENGINE (ADAPTIVE & OPTIMIZED)
        async function generatePDF() {
            document.getElementById('loader').style.display = 'flex';
            const doc = new jsPDF({ unit: 'mm', format: 'a4', compress: true });
            const pW = 210, pH = 297, margin = 25, cW = pW - (margin * 2);

            // 1. ADAPTIVE COVER
            if (coverBase64) {
                const props = doc.getImageProperties(coverBase64);
                const w = props.width * 0.2645, h = props.height * 0.2645;
                doc.deletePage(1);
                doc.addPage([w, h], h > w ? 'p' : 'l');
                doc.addImage(coverBase64, 'JPEG', 0, 0, w, h, undefined, 'FAST');
            }

            // 2. INTERNAL TITLE PAGE (A4)
            doc.addPage('a4', 'p');
            doc.setFont("times", "bold").setFontSize(32);
            doc.text((document.getElementById('title').value || "NOVEL").toUpperCase(), pW/2, 80, { align: 'center' });
            doc.setFont("times", "normal").setFontSize(16);
            doc.text("Ditulis Oleh: " + (document.getElementById('author').value || "Anonim"), pW/2, 100, { align: 'center' });
            
            let y = 115;
            const ill = document.getElementById('illustrator').value;
            const tra = document.getElementById('translator').value;
            if(ill) { doc.text("Ilustrator: " + ill, pW/2, y, { align: 'center' }); y += 10; }
            if(tra) { doc.text("Penerjemah: " + tra, pW/2, y, { align: 'center' }); }

            // 3. SYNOPSIS PAGE (A4)
            const syn = document.getElementById('synopsis').value;
            if (syn) {
                doc.addPage('a4', 'p');
                doc.setFont("times", "bold").setFontSize(18).text("Sinopsis", margin, 40);
                doc.setFont("times", "italic").setFontSize(12);
                doc.text(doc.splitTextToSize(syn, cW), margin, 50);
            }

            // 4. MAIN CONTENT
            doc.addPage('a4', 'p');
            let curY = 30;
            for (const b of blocks) {
                if (b.type === 'header') {
                    if (curY > 50) { doc.addPage('a4', 'p'); curY = 30; }
                    doc.setFont("times", "bold").setFontSize(22).text(b.value, margin, curY);
                    curY += 15;
                } else if (b.type === 'text') {
                    doc.setFont("times", "normal").setFontSize(12);
                    const lines = doc.splitTextToSize(b.value, cW);
                    const h = lines.length * 7;
                    if (curY + h > pH - margin) { doc.addPage('a4', 'p'); curY = 30; }
                    doc.text(lines, margin, curY);
                    curY += h + 6;
                } else if (b.type === 'image') {
                    // ADAPTIVE PAGE FOR ILLUSTRATION
                    const props = doc.getImageProperties(b.value);
                    const w = props.width * 0.2645, h = props.height * 0.2645;
                    doc.addPage([w, h], h > w ? 'p' : 'l');
                    doc.addImage(b.value, 'JPEG', 0, 0, w, h, undefined, 'FAST');
                    doc.addPage('a4', 'p'); curY = 30;
                }
            }

            // PAGINATION (Only on A4 Pages)
            const total = doc.internal.getNumberOfPages();
            for(let i = 1; i <= total; i++) {
                doc.setPage(i);
                if (Math.round(doc.internal.pageSize.getWidth()) === 210) {
                    doc.setFontSize(9).setFont("times", "italic").text("- " + i + " -", pW / 2, pH - 10, { align: "center" });
                }
            }

            doc.save(`${document.getElementById('title').value || 'kazue_studio_novel'}.pdf`);
            document.getElementById('loader').style.display = 'none';
        }
    </script>
</body>
</html>
