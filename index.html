<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kazue Pdf Studio - Novel Maker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #6366f1; --dark: #0f172a; --gray: #f1f5f9; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--gray); margin: 0; padding: 20px; color: #334155; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        header { text-align: center; border-bottom: 2px solid var(--gray); margin-bottom: 30px; padding-bottom: 20px; position: relative; }
        .save-status { position: absolute; top: 0; right: 0; font-size: 11px; color: #10b981; font-weight: bold; }

        .section { margin-bottom: 25px; padding: 20px; border: 1px solid #e2e8f0; border-radius: 10px; }
        .section-title { font-weight: bold; margin-bottom: 15px; display: block; color: var(--dark); font-size: 1.1rem; }

        .grid-input { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        textarea { resize: vertical; min-height: 100px; }

        .chapter-card { background: #f8fafc; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid var(--primary); position: relative; }
        .remove-chapter { position: absolute; top: 10px; right: 10px; background: #ef4444; color: white; border: none; border-radius: 5px; cursor: pointer; padding: 5px 10px; }

        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-add { background: var(--primary); color: white; margin-top: 10px; }
        .btn-download { background: #10b981; color: white; width: 100%; font-size: 1.2rem; margin-top: 30px; }
        .btn-clear { background: #64748b; color: white; margin-top: 10px; }

        #preview-cover { max-width: 150px; margin-top: 10px; border-radius: 5px; border: 1px solid #ddd; }
        .loader { display: none; text-align: center; font-weight: bold; color: var(--primary); margin: 20px 0; }
        .img-preview-mini { max-width: 100px; display: block; margin-top: 5px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div id="autosave-label" class="save-status">Draf Tersimpan Otomatis</div>
        <h1>Kazue Pdf Studio</h1>
        <p>Pembuat PDF Novel Profesional</p>
    </header>

    <!-- Metadata Section -->
    <div class="section">
        <span class="section-title">Informasi Novel (Metadata)</span>
        <div class="grid-input">
            <input type="text" id="title" placeholder="Judul Novel" class="save-local">
            <input type="text" id="author" placeholder="Penulis" class="save-local">
            <input type="text" id="illustrator" placeholder="Ilustrator" class="save-local">
            <input type="text" id="translator" placeholder="Penerjemah" class="save-local">
            <input type="text" id="genre" placeholder="Genre" class="save-local">
            <div>
                <label style="font-size: 11px;">Cover Novel:</label>
                <input type="file" id="cover-input" accept="image/*">
                <img id="preview-cover" style="display:none;">
            </div>
        </div>
        <textarea id="synopsis" placeholder="Sinopsis Novel..." class="save-local" style="margin-top:15px;"></textarea>
    </div>

    <!-- Chapters Section -->
    <div class="section">
        <span class="section-title">Struktur Bab</span>
        <div id="chapters-container"></div>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-add" onclick="addChapter('biasa')">+ Bab Biasa</button>
            <button class="btn btn-add" style="background:#6366f199" onclick="addChapter('ilustrasi')">+ Bab Ilustrasi</button>
        </div>
    </div>

    <div id="loader" class="loader">Sedang Menyusun Novel...</div>
    
    <button id="download-btn" class="btn btn-download" onclick="generateNovelPDF()">Download PDF Novel</button>
    <button class="btn btn-clear" onclick="clearData()" style="width:100%">Hapus Semua Draf (Reset)</button>
</div>

<script>
    const { jsPDF } = window.jspdf;
    let chapters = [];

    // --- LOGIKA AUTOSAVE ---

    function saveToLocal() {
        const data = {
            title: document.getElementById('title').value,
            author: document.getElementById('author').value,
            illustrator: document.getElementById('illustrator').value,
            translator: document.getElementById('translator').value,
            genre: document.getElementById('genre').value,
            synopsis: document.getElementById('synopsis').value,
            chapters: []
        };

        document.querySelectorAll('.chapter-card').forEach(card => {
            const type = card.dataset.type;
            const chData = {
                type: type,
                title: card.querySelector('.ch-title').value,
                text: type === 'biasa' ? card.querySelector('.ch-text').value : '',
                // Gambar tidak disimpan di localStorage untuk menghindari limit storage error
            };
            data.chapters.push(chData);
        });

        localStorage.setItem('kazue_novel_draft', JSON.stringify(data));
        showSaveStatus();
    }

    function loadFromLocal() {
        const saved = localStorage.getItem('kazue_novel_draft');
        if (!saved) return;
        
        const data = JSON.parse(saved);
        document.getElementById('title').value = data.title || '';
        document.getElementById('author').value = data.author || '';
        document.getElementById('illustrator').value = data.illustrator || '';
        document.getElementById('translator').value = data.translator || '';
        document.getElementById('genre').value = data.genre || '';
        document.getElementById('synopsis').value = data.synopsis || '';

        data.chapters.forEach(ch => {
            addChapter(ch.type, ch.title, ch.text);
        });
    }

    function showSaveStatus() {
        const label = document.getElementById('autosave-label');
        label.innerText = "Draf Tersimpan: " + new Date().toLocaleTimeString();
        label.style.color = "#10b981";
    }

    function clearData() {
        if(confirm("Hapus semua data yang sudah diketik?")) {
            localStorage.removeItem('kazue_novel_draft');
            location.reload();
        }
    }

    // --- LOGIKA UI & CHAPTER ---

    function addChapter(type, savedTitle = '', savedText = '') {
        const id = Date.now() + Math.random();
        const container = document.getElementById('chapters-container');
        const div = document.createElement('div');
        div.className = 'chapter-card';
        div.dataset.type = type;
        div.id = `ch-${id}`;

        let contentHtml = '';
        if (type === 'biasa') {
            contentHtml = `
                <strong>Bab Biasa</strong>
                <input type="text" placeholder="Judul Bab" class="ch-title save-local" value="${savedTitle}" style="margin:10px 0;">
                <textarea placeholder="Isi cerita..." class="ch-text save-local">${savedText}</textarea>
                <label style="font-size:11px; margin-top:10px; display:block;">Gambar Bab (Opsional):</label>
                <input type="file" accept="image/*" class="ch-img">
            `;
        } else {
            contentHtml = `
                <strong>Bab Ilustrasi (Full Page)</strong>
                <input type="text" placeholder="Nama Ilustrasi" class="ch-title save-local" value="${savedTitle}" style="margin:10px 0;">
                <input type="file" accept="image/*" class="ch-img-full">
            `;
        }

        div.innerHTML = contentHtml + `<button class="remove-chapter" onclick="document.getElementById('ch-${id}').remove(); saveToLocal();">Hapus</button>`;
        container.appendChild(div);
        
        // Pasang event listener untuk autosave pada element baru
        div.querySelectorAll('.save-local').forEach(el => {
            el.addEventListener('input', saveToLocal);
        });
    }

    // --- PROSES PDF ---

    async function getImageData(file) {
        if (!file) return null;
        return new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = e => resolve(e.target.result);
            reader.readAsDataURL(file);
        });
    }

    async function getDimensions(src) {
        return new Promise(resolve => {
            const img = new Image();
            img.onload = () => resolve({ w: img.width, h: img.height });
            img.src = src;
        });
    }

    async function generateNovelPDF() {
        const loader = document.getElementById('loader');
        loader.style.display = 'block';

        const doc = new jsPDF({ unit: 'px', hotfixes: ["px_scaling"] });
        doc.deletePage(1);

        // 1. Cover
        const coverInput = document.getElementById('cover-input').files[0];
        if (coverInput) {
            const src = await getImageData(coverInput);
            const dim = await getDimensions(src);
            doc.addPage([dim.w, dim.h], dim.w > dim.h ? 'l' : 'p');
            doc.addImage(src, 'JPEG', 0, 0, dim.w, dim.h, undefined, 'MEDIUM');
        }

        // 2. Info Novel & Sinopsis
        doc.addPage([600, 800], 'p');
        let y = 50;
        doc.setFontSize(24);
        doc.text(document.getElementById('title').value || "Untitled", 40, y); y += 50;
        doc.setFontSize(12);
        doc.text(`Penulis: ${document.getElementById('author').value || "-"}`, 40, y); y += 20;
        doc.text(`Ilustrator: ${document.getElementById('illustrator').value || "-"}`, 40, y); y += 20;
        doc.text(`Genre: ${document.getElementById('genre').value || "-"}`, 40, y); y += 40;
        
        doc.setFont("helvetica", "bold");
        doc.text("Sinopsis:", 40, y); y += 20;
        doc.setFont("helvetica", "normal");
        const syn = doc.splitTextToSize(document.getElementById('synopsis').value || "-", 520);
        doc.text(syn, 40, y);

        // 3. Bab
        const cards = document.querySelectorAll('.chapter-card');
        for (const card of cards) {
            const type = card.dataset.type;
            const title = card.querySelector('.ch-title').value;

            if (type === 'ilustrasi') {
                const imgFile = card.querySelector('.ch-img-full').files[0];
                if (imgFile) {
                    const src = await getImageData(imgFile);
                    const dim = await getDimensions(src);
                    doc.addPage([dim.w, dim.h], dim.w > dim.h ? 'l' : 'p');
                    doc.addImage(src, 'JPEG', 0, 0, dim.w, dim.h, undefined, 'MEDIUM');
                }
            } else {
                doc.addPage([600, 850], 'p');
                doc.setFontSize(18);
                doc.text(title || "Bab Baru", 40, 50);
                
                let currentY = 80;
                const imgFile = card.querySelector('.ch-img').files[0];
                if (imgFile) {
                    const src = await getImageData(imgFile);
                    const dim = await getDimensions(src);
                    const ratio = dim.w / 520;
                    const h = dim.h / ratio;
                    doc.addImage(src, 'JPEG', 40, currentY, 520, h, undefined, 'MEDIUM');
                    currentY += h + 20;
                }
                
                doc.setFontSize(11);
                const lines = doc.splitTextToSize(card.querySelector('.ch-text').value, 520);
                doc.text(lines, 40, currentY);
            }
        }

        doc.save((document.getElementById('title').value || 'novel') + '.pdf');
        loader.style.display = 'none';
    }

    // Inisialisasi
    window.onload = () => {
        loadFromLocal();
        document.querySelectorAll('.save-local').forEach(el => {
            el.addEventListener('input', saveToLocal);
        });
    };
</script>

</body>
</html>
