<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kazue Studio V3 - Ultimate Novel Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #020617; color: #f1f5f9; }
        .novel-font { font-family: 'Crimson Pro', serif; }
        .block-card:hover .btn-delete { opacity: 1; }
        .loading-screen { display: none; background: rgba(0,0,0,0.95); position: fixed; inset: 0; z-index: 9999; align-items: center; justify-content: center; flex-direction: column; }
        input, textarea, select { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; }
        input:focus, textarea:focus { border-color: #3b82f6 !important; outline: none; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Loading Overlay -->
    <div id="loader" class="loading-screen">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-blue-500 mb-4"></div>
        <p id="loaderText" class="text-blue-400 font-black tracking-widest animate-pulse text-xs uppercase">Processing Masterpiece...</p>
    </div>

    <div class="max-w-7xl mx-auto p-4 lg:p-10">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6 bg-slate-900/50 p-6 rounded-[2rem] border border-slate-800 backdrop-blur-md">
            <div class="text-center md:text-left">
                <h1 class="text-5xl font-black tracking-tighter italic text-white">KAZUE <span class="text-blue-600 font-black">STUDIO</span></h1>
                <div class="flex items-center gap-2 mt-2 justify-center md:justify-start">
                    <span id="saveStatus" class="text-[9px] bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full border border-blue-500/20 uppercase font-black tracking-widest">System Ready</span>
                </div>
            </div>
            <div class="flex flex-wrap justify-center gap-3">
                <button onclick="resetStudio()" class="bg-slate-800 hover:bg-red-900 text-white px-6 py-3 rounded-2xl text-xs font-bold transition uppercase tracking-widest">Reset Studio</button>
                <button onclick="generatePDF()" class="bg-blue-600 hover:bg-blue-500 text-white font-black px-10 py-4 rounded-2xl shadow-[0_10px_40px_rgba(37,99,235,0.3)] transition transform active:scale-95 uppercase text-sm tracking-tighter">Download PDF Novel</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            
            <!-- SIDEBAR: KONFIGURASI -->
            <div class="lg:col-span-4 space-y-6">
                
                <!-- Master Cover -->
                <div class="bg-slate-900 p-6 rounded-[2rem] border border-slate-800 shadow-xl">
                    <h2 class="text-[10px] font-black text-blue-500 uppercase tracking-[0.2em] mb-4">Main Cover (Adaptive)</h2>
                    <div id="coverPreview" class="hidden mb-4 relative rounded-2xl overflow-hidden border border-slate-700">
                        <img id="imgCover" src="#" class="w-full h-auto">
                        <button onclick="removeCover()" class="absolute top-3 right-3 bg-red-600 text-white w-8 h-8 rounded-full font-bold shadow-xl">×</button>
                    </div>
                    <label class="flex flex-col items-center justify-center w-full h-28 border-2 border-dashed border-slate-800 rounded-3xl cursor-pointer hover:bg-slate-800 transition" id="coverLabel">
                        <span class="text-2xl mb-1">🖼️</span>
                        <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Set Main Cover</p>
                        <input type="file" id="coverInput" class="hidden" accept="image/*" onchange="handleFile(event, 'cover')" />
                    </label>
                </div>

                <!-- Professional Metadata -->
                <div class="bg-slate-900 p-6 rounded-[2rem] border border-slate-800 shadow-xl space-y-3">
                    <h2 class="text-[10px] font-black text-blue-500 uppercase tracking-[0.2em] mb-2">Book Metadata</h2>
                    <input type="text" id="title" oninput="autoSave()" placeholder="Judul Novel" class="w-full p-4 rounded-2xl outline-none text-sm font-bold">
                    <input type="text" id="author" oninput="autoSave()" placeholder="Nama Penulis" class="w-full p-3 rounded-xl outline-none text-sm">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="genre" oninput="autoSave()" placeholder="Genre" class="p-3 rounded-xl outline-none text-sm">
                        <input type="text" id="publisher" oninput="autoSave()" placeholder="Penerbit" class="p-3 rounded-xl outline-none text-sm">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="illustrator" oninput="autoSave()" placeholder="Ilustrator" class="p-3 rounded-xl outline-none text-sm">
                        <input type="text" id="translator" oninput="autoSave()" placeholder="Penerjemah" class="p-3 rounded-xl outline-none text-sm">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="space-y-1">
                            <label class="text-[8px] text-slate-500 ml-2 uppercase">Tanggal Rilis</label>
                            <input type="date" id="relDate" oninput="autoSave()" class="w-full p-3 rounded-xl outline-none text-sm">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[8px] text-slate-500 ml-2 uppercase">Seri / ISBN</label>
                            <input type="text" id="serial" oninput="autoSave()" placeholder="ISBN..." class="w-full p-3 rounded-xl outline-none text-sm">
                        </div>
                    </div>
                    <textarea id="synopsis" oninput="autoSave()" rows="3" placeholder="Sinopsis Novel..." class="w-full p-4 rounded-2xl outline-none text-sm resize-none leading-relaxed"></textarea>
                </div>

                <!-- Content Toolbox -->
                <div class="bg-slate-900 p-6 rounded-[2rem] border border-slate-800 shadow-xl">
                    <h2 class="text-[10px] font-black text-blue-500 uppercase tracking-[0.2em] mb-4">Add Content</h2>
                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <button onclick="addBlock('header')" class="bg-slate-100 text-slate-950 p-4 rounded-2xl hover:bg-white transition text-[10px] font-black uppercase">Judul Bab</button>
                        <button onclick="addBlock('text')" class="bg-blue-600 text-white p-4 rounded-2xl hover:bg-blue-500 transition text-[10px] font-black uppercase">Paragraf</button>
                        <button onclick="document.getElementById('bulkImg').click()" class="col-span-2 border-2 border-slate-800 p-4 rounded-2xl hover:bg-slate-800 transition text-[10px] font-black uppercase text-slate-400">+ Upload Ilustrasi (Bulk)</button>
                        <input type="file" id="bulkImg" multiple accept="image/*" class="hidden" onchange="handleFile(event, 'bulk')">
                    </div>
                    <div class="flex gap-2">
                        <input type="text" id="urlInput" placeholder="Paste Image URL..." class="flex-1 p-3 rounded-xl outline-none text-[10px]">
                        <button onclick="addImageFromUrl()" class="bg-slate-800 px-4 rounded-xl text-[10px] font-black transition">ADD</button>
                    </div>
                </div>
            </div>

            <!-- MAIN EDITOR -->
            <div class="lg:col-span-8">
                <div class="bg-slate-900 min-h-screen rounded-[3rem] border border-slate-800 shadow-2xl p-6 lg:p-12">
                    <div class="flex justify-between items-center mb-10 border-b border-slate-800 pb-6">
                        <h2 class="text-2xl font-black italic tracking-tighter text-white uppercase">Draft Editor</h2>
                        <span id="counter" class="text-[9px] font-black bg-slate-800 text-slate-400 px-4 py-1.5 rounded-full border border-slate-700 uppercase tracking-[0.2em]">0 Blocks</span>
                    </div>
                    <div id="editorSpace" class="space-y-8">
                        <div id="emptyState" class="text-center py-40 opacity-20">
                            <p class="text-8xl mb-6">🖋️</p>
                            <p class="text-xl font-bold uppercase tracking-[0.4em]">Kazue Studio</p>
                            <p class="text-sm italic mt-2 uppercase tracking-widest text-slate-500">Ready for your masterpiece</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const { jsPDF } = window.jspdf;
        let coverBase64 = null;
        let blocks = [];
        let db;

        // --- 1. DATABASE SYSTEM (AUTOSAVE) ---
        const request = indexedDB.open("KazueStudioPro", 1);
        request.onupgradeneeded = e => {
            db = e.target.result;
            db.createObjectStore("novel_data", { keyPath: "id" });
        };
        request.onsuccess = e => {
            db = e.target.result;
            loadData();
        };

        function saveToDB() {
            const data = {
                id: "active_project",
                title: document.getElementById('title').value,
                author: document.getElementById('author').value,
                genre: document.getElementById('genre').value,
                publisher: document.getElementById('publisher').value,
                illustrator: document.getElementById('illustrator').value,
                translator: document.getElementById('translator').value,
                relDate: document.getElementById('relDate').value,
                serial: document.getElementById('serial').value,
                synopsis: document.getElementById('synopsis').value,
                cover: coverBase64,
                blocks: blocks
            };
            const tx = db.transaction("novel_data", "readwrite");
            tx.objectStore("novel_data").put(data);
            document.getElementById('saveStatus').innerText = "Autosaved";
            setTimeout(() => document.getElementById('saveStatus').innerText = "System Ready", 2000);
        }

        function loadData() {
            const tx = db.transaction("novel_data", "readonly");
            const req = tx.objectStore("novel_data").get("active_project");
            req.onsuccess = () => {
                const res = req.result;
                if (!res) return;
                document.getElementById('title').value = res.title || "";
                document.getElementById('author').value = res.author || "";
                document.getElementById('genre').value = res.genre || "";
                document.getElementById('publisher').value = res.publisher || "";
                document.getElementById('illustrator').value = res.illustrator || "";
                document.getElementById('translator').value = res.translator || "";
                document.getElementById('relDate').value = res.relDate || "";
                document.getElementById('serial').value = res.serial || "";
                document.getElementById('synopsis').value = res.synopsis || "";
                if (res.cover) {
                    coverBase64 = res.cover;
                    document.getElementById('imgCover').src = res.cover;
                    document.getElementById('coverPreview').classList.remove('hidden');
                    document.getElementById('coverLabel').classList.add('hidden');
                }
                blocks = res.blocks || [];
                render();
            };
        }

        function autoSave() {
            document.getElementById('saveStatus').innerText = "Saving...";
            saveToDB();
        }

        function resetStudio() {
            if(confirm("PERINGATAN: Hapus semua draf novel?")) {
                const tx = db.transaction("novel_data", "readwrite");
                tx.objectStore("novel_data").delete("active_project");
                location.reload();
            }
        }

        // --- 2. IMAGE ENGINE (COMPRESSION & PARALLEL) ---
        async function compressImage(base64, maxWidth = 1600) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if (w > maxWidth || h > maxWidth) {
                        const r = Math.min(maxWidth/w, maxWidth/h);
                        w *= r; h *= r;
                    }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.75));
                };
            });
        }

        async function handleFile(e, mode) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            document.getElementById('loader').style.display = 'flex';
            
            // Proses paralel untuk kecepatan
            await Promise.all(files.map(async (file) => {
                const b64 = await new Promise(res => {
                    const r = new FileReader();
                    r.onload = ev => res(ev.target.result);
                    r.readAsDataURL(file);
                });
                const comp = await compressImage(b64);
                if (mode === 'cover') {
                    coverBase64 = comp;
                    document.getElementById('imgCover').src = comp;
                    document.getElementById('coverPreview').classList.remove('hidden');
                    document.getElementById('coverLabel').classList.add('hidden');
                } else {
                    blocks.push({ id: Date.now() + Math.random(), type: 'image', value: comp });
                }
            }));
            
            render();
            autoSave();
            document.getElementById('loader').style.display = 'none';
        }

        async function addImageFromUrl() {
            const url = document.getElementById('urlInput').value;
            if(!url) return;
            document.getElementById('loader').style.display = 'flex';
            try {
                const res = await fetch(url);
                const blob = await res.blob();
                const b64 = await new Promise(r => {
                    const reader = new FileReader();
                    reader.onloadend = () => r(reader.result);
                    reader.readAsDataURL(blob);
                });
                const comp = await compressImage(b64);
                blocks.push({ id: Date.now() + Math.random(), type: 'image', value: comp });
                render();
                autoSave();
                document.getElementById('urlInput').value = '';
            } catch(e) { alert("CORS Error: Tidak dapat mengambil gambar dari URL ini secara langsung."); }
            document.getElementById('loader').style.display = 'none';
        }

        // --- 3. EDITOR ENGINE ---
        function addBlock(type) {
            blocks.push({ id: Date.now() + Math.random(), type, value: "" });
            render();
            autoSave();
        }

        function updateBlock(id, val) {
            const idx = blocks.findIndex(b => b.id === id);
            blocks[idx].value = val;
            autoSave();
        }

        function deleteBlock(id) {
            blocks = blocks.filter(b => b.id !== id);
            render();
            autoSave();
        }

        function render() {
            const space = document.getElementById('editorSpace');
            const empty = document.getElementById('emptyState');
            const counter = document.getElementById('counter');
            space.innerHTML = '';
            empty.style.display = blocks.length ? 'none' : 'block';
            counter.innerText = `${blocks.length} BLOCKS`;

            blocks.forEach((b, i) => {
                const div = document.createElement('div');
                div.className = "block-card relative bg-slate-950/50 p-6 rounded-3xl border border-slate-800 transition hover:border-slate-700";
                let input = '';
                if(b.type === 'header') {
                    input = `<input type="text" class="w-full bg-transparent font-black text-2xl outline-none" value="${b.value}" oninput="updateBlock(${b.id}, this.value)" placeholder="JUDUL BAB...">`;
                } else if(b.type === 'text') {
                    input = `<textarea class="w-full bg-transparent novel-font text-xl outline-none resize-none leading-relaxed" rows="5" oninput="updateBlock(${b.id}, this.value)" placeholder="Tulis cerita...">${b.value}</textarea>`;
                } else {
                    input = `<div class="text-center group"><img src="${b.value}" class="max-h-80 rounded-2xl mx-auto shadow-2xl border border-slate-800 transition group-hover:scale-[1.01]"></div>`;
                }
                
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-4 border-b border-slate-800/50 pb-2">
                        <span class="text-[9px] font-black text-slate-600 uppercase tracking-widest tracking-tighter">Block #${i+1} - ${b.type}</span>
                        <button onclick="deleteBlock(${b.id})" class="btn-delete opacity-0 text-red-500 font-bold text-[9px] uppercase tracking-widest transition">Delete</button>
                    </div>${input}`;
                space.appendChild(div);
            });
        }

        // --- 4. GENERATOR ENGINE (ADAPTIVE & OPTIMIZED) ---
        async function generatePDF() {
            document.getElementById('loader').style.display = 'flex';
            document.getElementById('loaderText').innerText = "GENERATING PDF...";
            
            const doc = new jsPDF({ unit: 'mm', format: 'a4', compress: true });
            const pW = 210, pH = 297, margin = 25, cW = pW - (margin * 2);

            // 1. Adaptive Cover
            if (coverBase64) {
                const p = doc.getImageProperties(coverBase64);
                const w = p.width * 0.2645, h = p.height * 0.2645;
                doc.deletePage(1);
                doc.addPage([w, h], h > w ? 'p' : 'l');
                doc.addImage(coverBase64, 'JPEG', 0, 0, w, h, undefined, 'FAST');
            }

            // 2. Info Page (A4)
            doc.addPage('a4', 'p');
            doc.setFont("times", "bold").setFontSize(30).text((document.getElementById('title').value || "UNTITLED NOVEL").toUpperCase(), pW/2, 70, { align: 'center' });
            doc.setFontSize(14).setFont("times", "normal");
            let y = 90;
            const meta = [
                ["Penulis", 'author'], ["Genre", 'genre'], ["Penerbit", 'publisher'],
                ["Illustrator", 'illustrator'], ["Penerjemah", 'translator'], ["Rilis", 'relDate'], ["Seri", 'serial']
            ];
            meta.forEach(m => {
                const v = document.getElementById(m[1]).value;
                if(v) { doc.text(`${m[0]}: ${v}`, pW/2, y, { align: 'center' }); y += 10; }
            });

            // 3. Synopsis (A4)
            const syn = document.getElementById('synopsis').value;
            if (syn) {
                doc.addPage('a4', 'p');
                doc.setFont("times", "bold").setFontSize(18).text("Sinopsis", margin, 40);
                doc.setFont("times", "italic").setFontSize(12);
                doc.text(doc.splitTextToSize(syn, cW), margin, 50);
            }

            // 4. Main Body
            doc.addPage('a4', 'p');
            let curY = 30;
            for (const b of blocks) {
                if (b.type === 'header') {
                    if (curY > 50) { doc.addPage('a4', 'p'); curY = 30; }
                    doc.setFont("times", "bold").setFontSize(22).text(b.value, margin, curY);
                    curY += 15;
                } else if (b.type === 'text') {
                    doc.setFont("times", "normal").setFontSize(12);
                    const lines = doc.splitTextToSize(b.value, cW);
                    const h = lines.length * 7;
                    if (curY + h > pH - margin) { doc.addPage('a4', 'p'); curY = 30; }
                    doc.text(lines, margin, curY);
                    curY += h + 6;
                } else if (b.type === 'image') {
                    const p = doc.getImageProperties(b.value);
                    const w = p.width * 0.2645, h = p.height * 0.2645;
                    doc.addPage([w, h], h > w ? 'p' : 'l');
                    doc.addImage(b.value, 'JPEG', 0, 0, w, h, undefined, 'FAST');
                    doc.addPage('a4', 'p'); curY = 30;
                }
            }

            // Pagination (Hanya A4)
            const total = doc.internal.getNumberOfPages();
            for(let i = 1; i <= total; i++) {
                doc.setPage(i);
                if (Math.round(doc.internal.pageSize.getWidth()) === 210) {
                    doc.setFontSize(9).setFont("times", "italic").text("- " + i + " -", pW/2, pH - 10, { align: "center" });
                }
            }

            doc.save(`${document.getElementById('title').value || 'novel'}.pdf`);
            document.getElementById('loader').style.display = 'none';
        }
    </script>
</body>
</html>
