<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kazue Pdf Studio - Infinite Novel Maker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #f8fafc;
            --card: #ffffff;
            --text-dark: #0f172a;
            --border: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text-dark); margin: 0; padding-bottom: 120px; }

        nav {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); padding: 1rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-weight: 800; font-size: 1.4rem; color: var(--primary); letter-spacing: -1px; }
        .save-status { font-size: 0.75rem; color: var(--success); font-weight: 600; background: #dcfce7; padding: 4px 12px; border-radius: 20px; }

        .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }

        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 16px; padding: 1.5rem; margin-bottom: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
        label { display: block; font-size: 0.8rem; font-weight: 700; color: #64748b; margin-bottom: 5px; }
        input[type="text"], textarea {
            width: 100%; padding: 0.7rem; border: 1px solid var(--border);
            border-radius: 8px; font-size: 0.9rem; margin-bottom: 10px;
        }

        /* Chapter Styles */
        .chapter-card {
            background: white; border: 2px solid var(--border);
            border-radius: 16px; padding: 1.5rem; margin-bottom: 2rem; position: relative;
        }
        .chapter-type { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; display: block; }
        
        /* Blocks System */
        .blocks-container { margin-top: 1rem; display: flex; flex-direction: column; gap: 1rem; }
        .block-item { 
            padding: 1rem; border-radius: 10px; background: #f1f5f9; position: relative; 
            border-left: 4px solid var(--primary);
        }
        .btn-delete-block { position: absolute; top: 5px; right: 5px; background: none; border: none; color: var(--danger); cursor: pointer; font-size: 0.8rem; }
        
        .block-image-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px; }
        .block-image-inputs input { margin-bottom: 0; font-size: 0.75rem; }

        /* Buttons */
        .action-bar {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
            background: #0f172a; padding: 0.8rem 1.5rem; border-radius: 50px;
            display: flex; gap: 10px; z-index: 1000; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .btn {
            padding: 0.6rem 1.2rem; border-radius: 25px; border: none;
            font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 0.85rem;
        }
        .btn-add { background: var(--primary); color: white; }
        .btn-secondary { background: #334155; color: white; }
        .btn-block { background: #e2e8f0; color: var(--text-dark); margin-top: 5px; padding: 5px 15px; font-size: 0.7rem; }
        .btn-danger { background: #fee2e2; color: var(--danger); font-size: 0.7rem; padding: 4px 8px; border-radius: 5px; border: none; cursor: pointer; }

        #loader {
            display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9);
            z-index: 2000; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<nav>
    <div class="logo">Kazue Pdf Studio</div>
    <div id="save-status" class="save-status">Draf Tersimpan</div>
</nav>

<div class="container">
    <!-- Metadata -->
    <div class="card">
        <label>JUDUL NOVEL</label>
        <input type="text" id="title" class="save-local" placeholder="Masukkan Judul...">
        <div class="grid-inputs">
            <div><label>PENULIS</label><input type="text" id="author" class="save-local"></div>
            <div><label>ILUSTRATOR</label><input type="text" id="illustrator" class="save-local"></div>
            <div><label>GENRE</label><input type="text" id="genre" class="save-local"></div>
            <div>
                <label>COVER (FILE/URL)</label>
                <input type="file" id="cover-file" accept="image/*">
                <input type="text" id="cover-url" class="save-local" placeholder="Atau URL Image...">
            </div>
        </div>
        <label>SINOPSIS</label>
        <textarea id="synopsis" class="save-local" style="height: 80px;"></textarea>
    </div>

    <!-- Chapter List -->
    <div id="chapters-list"></div>
</div>

<div class="action-bar">
    <button class="btn btn-add" onclick="addChapter('biasa')">➕ Bab Teks</button>
    <button class="btn btn-secondary" onclick="addChapter('ilustrasi')">🖼️ Bab Ilustrasi</button>
    <button class="btn btn-add" style="background: var(--success);" onclick="generatePDF()">🚀 DOWNLOAD PDF</button>
</div>

<div id="loader">
    <div class="spinner"></div>
    <p style="margin-top: 15px; font-weight: 700;">Menyusun Novel Anda...</p>
</div>

<script>
    const { jsPDF } = window.jspdf;

    // --- Autosave Logic ---
    function saveAll() {
        const data = {
            title: document.getElementById('title').value,
            author: document.getElementById('author').value,
            illustrator: document.getElementById('illustrator').value,
            genre: document.getElementById('genre').value,
            synopsis: document.getElementById('synopsis').value,
            coverUrl: document.getElementById('cover-url').value,
            chapters: []
        };

        document.querySelectorAll('.chapter-card').forEach(card => {
            const chapter = {
                type: card.dataset.type,
                title: card.querySelector('.ch-title').value,
                blocks: []
            };
            
            card.querySelectorAll('.block-item').forEach(block => {
                chapter.blocks.push({
                    type: block.dataset.type,
                    text: block.querySelector('textarea')?.value || '',
                    url: block.querySelector('.block-url')?.value || ''
                });
            });
            
            // Khusus Bab Ilustrasi
            if(chapter.type === 'ilustrasi') {
                chapter.fullUrl = card.querySelector('.url-full')?.value || '';
            }

            data.chapters.push(chapter);
        });

        localStorage.setItem('kazue_dynamic_draft', JSON.stringify(data));
        document.getElementById('save-status').innerText = "Tersimpan: " + new Date().toLocaleTimeString();
    }

    function loadAll() {
        const saved = localStorage.getItem('kazue_dynamic_draft');
        if (!saved) return;
        const data = JSON.parse(saved);
        
        document.getElementById('title').value = data.title || '';
        document.getElementById('author').value = data.author || '';
        document.getElementById('illustrator').value = data.illustrator || '';
        document.getElementById('genre').value = data.genre || '';
        document.getElementById('synopsis').value = data.synopsis || '';
        document.getElementById('cover-url').value = data.coverUrl || '';

        data.chapters.forEach(ch => addChapter(ch.type, ch));
    }

    // --- UI Logic ---
    function addChapter(type, saved = null) {
        const container = document.getElementById('chapters-list');
        const id = Date.now() + Math.random();
        const div = document.createElement('div');
        div.className = 'chapter-card';
        div.id = `ch-${id}`;
        div.dataset.type = type;

        let html = `<button class="btn-danger" style="position:absolute; top:15px; right:15px;" onclick="document.getElementById('ch-${id}').remove(); saveAll();">Hapus Bab</button>`;
        
        if(type === 'biasa') {
            html += `
                <span class="chapter-type" style="color:var(--primary)">Bab Teks</span>
                <input type="text" class="ch-title save-local" placeholder="Judul Bab" value="${saved?.title || ''}">
                <div class="blocks-container" id="blocks-${id}"></div>
                <div style="margin-top:15px; display:flex; gap:10px;">
                    <button class="btn btn-block" onclick="addBlock('${id}', 'text')">➕ Tambah Teks</button>
                    <button class="btn btn-block" onclick="addBlock('${id}', 'image')">➕ Tambah Gambar</button>
                </div>
            `;
        } else {
            html += `
                <span class="chapter-type" style="color:#d97706">Bab Ilustrasi Full</span>
                <input type="text" class="ch-title save-local" placeholder="Nama Ilustrasi" value="${saved?.title || ''}">
                <label style="font-size:0.7rem; margin-top:10px;">UPLOAD GAMBAR FULL-PAGE:</label>
                <input type="file" class="file-full" accept="image/*">
                <input type="text" class="url-full save-local" placeholder="Atau URL..." value="${saved?.fullUrl || ''}">
            `;
        }

        div.innerHTML = html;
        container.appendChild(div);

        if(saved && saved.blocks) {
            saved.blocks.forEach(b => addBlock(id, b.type, b));
        } else if (type === 'biasa') {
            addBlock(id, 'text'); // Block pertama default teks
        }

        div.querySelectorAll('.save-local').forEach(el => el.addEventListener('input', saveAll));
    }

    function addBlock(chapterId, type, saved = null) {
        const container = document.getElementById(`blocks-${chapterId}`);
        const div = document.createElement('div');
        div.className = 'block-item';
        div.dataset.type = type;

        if(type === 'text') {
            div.innerHTML = `
                <button class="btn-delete-block" onclick="this.parentElement.remove(); saveAll();">✕</button>
                <textarea class="save-local" placeholder="Tulis cerita di sini..." style="height:100px; margin-bottom:0;">${saved?.text || ''}</textarea>
            `;
        } else {
            div.innerHTML = `
                <button class="btn-delete-block" onclick="this.parentElement.remove(); saveAll();">✕</button>
                <label style="font-size:0.65rem;">GAMBAR DI DALAM TEKS</label>
                <div class="block-image-inputs">
                    <input type="file" class="block-file" accept="image/*">
                    <input type="text" class="block-url save-local" placeholder="URL Gambar..." value="${saved?.url || ''}">
                </div>
            `;
        }

        container.appendChild(div);
        div.querySelectorAll('.save-local').forEach(el => el.addEventListener('input', saveAll));
    }

    // --- PDF Helper ---
    async function getImg(fileEl, urlVal) {
        if (fileEl?.files[0]) {
            return new Promise(r => {
                const reader = new FileReader();
                reader.onload = e => r(e.target.result);
                reader.readAsDataURL(fileEl.files[0]);
            });
        }
        if (urlVal) {
            try {
                const res = await fetch(urlVal);
                const blob = await res.blob();
                return new Promise(r => {
                    const rd = new FileReader();
                    rd.onload = e => r(e.target.result);
                    rd.readAsDataURL(blob);
                });
            } catch(e) { return null; }
        }
        return null;
    }

    async function getDim(src) {
        return new Promise(r => {
            const i = new Image();
            i.onload = () => r({ w: i.width, h: i.height });
            i.src = src;
        });
    }

    // --- PDF Engine ---
    async function generatePDF() {
        const loader = document.getElementById('loader');
        loader.style.display = 'flex';

        const doc = new jsPDF({ unit: 'px', hotfixes: ["px_scaling"] });
        doc.deletePage(1);

        // 1. COVER
        const cover = await getImg(document.getElementById('cover-file'), document.getElementById('cover-url').value);
        if(cover) {
            const d = await getDim(cover);
            doc.addPage([d.w, d.h], d.w > d.h ? 'l' : 'p');
            doc.addImage(cover, 'JPEG', 0, 0, d.w, d.h, undefined, 'MEDIUM');
        }

        // 2. METADATA
        doc.addPage([600, 850], 'p');
        doc.setFontSize(26);
        doc.text(document.getElementById('title').value || "Novel Tanpa Judul", 40, 60);
        doc.setFontSize(11);
        doc.text(`Penulis: ${document.getElementById('author').value || "-"}`, 40, 90);
        doc.text(`Ilustrator: ${document.getElementById('illustrator').value || "-"}`, 40, 105);
        doc.text(`Genre: ${document.getElementById('genre').value || "-"}`, 40, 120);
        doc.setFont("helvetica", "bold");
        doc.text("SINOPSIS:", 40, 150);
        doc.setFont("helvetica", "normal");
        const syn = doc.splitTextToSize(document.getElementById('synopsis').value || "", 520);
        doc.text(syn, 40, 165);

        // 3. CHAPTERS
        const cards = document.querySelectorAll('.chapter-card');
        for (const card of cards) {
            const type = card.dataset.type;
            const title = card.querySelector('.ch-title').value;

            if(type === 'ilustrasi') {
                const src = await getImg(card.querySelector('.file-full'), card.querySelector('.url-full').value);
                if(src) {
                    const d = await getDim(src);
                    doc.addPage([d.w, d.h], d.w > d.h ? 'l' : 'p');
                    doc.addImage(src, 'JPEG', 0, 0, d.w, d.h, undefined, 'MEDIUM');
                }
            } else {
                // Bab Teks dengan Dynamic Blocks
                doc.addPage([600, 850], 'p');
                let curY = 60;
                doc.setFontSize(20);
                doc.text(title || "Bab Baru", 40, curY);
                curY += 40;

                const blocks = card.querySelectorAll('.block-item');
                for (const block of blocks) {
                    const bType = block.dataset.type;

                    if(bType === 'text') {
                        doc.setFontSize(11);
                        const txt = block.querySelector('textarea').value;
                        const lines = doc.splitTextToSize(txt, 520);
                        
                        // Cek Overflow Halaman
                        if(curY + (lines.length * 14) > 800) {
                            doc.addPage([600, 850], 'p');
                            curY = 40;
                        }
                        doc.text(lines, 40, curY);
                        curY += (lines.length * 14) + 15;
                    } else {
                        const img = await getImg(block.querySelector('.block-file'), block.querySelector('.block-url').value);
                        if(img) {
                            const d = await getDim(img);
                            const ratio = d.w / 500;
                            const h = d.h / ratio;

                            if(curY + h > 800) {
                                doc.addPage([600, 850], 'p');
                                curY = 40;
                            }
                            doc.addImage(img, 'JPEG', 50, curY, 500, h, undefined, 'MEDIUM');
                            curY += h + 20;
                        }
                    }
                }
            }
        }

        doc.save((document.getElementById('title').value || 'kazue-novel') + '.pdf');
        loader.style.display = 'none';
    }

    window.onload = loadAll;
</script>

</body>
</html>
