<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kazue Pdf Studio - Pro Novel Builder</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light Mode Colors */
            --bg: #f8fafc;
            --card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --nav-bg: rgba(255, 255, 255, 0.85);
            --block-bg: #f1f5f9;
        }

        body.dark-mode {
            --bg: #0f172a;
            --card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --nav-bg: rgba(15, 23, 42, 0.85);
            --block-bg: #0f172a;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.3s, color 0.3s; }
        body { background-color: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 150px; }

        /* Navbar & Header */
        nav {
            background: var(--nav-bg); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); padding: 0.8rem 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-weight: 800; font-size: 1.2rem; color: var(--primary); letter-spacing: -0.5px; }
        .nav-controls { display: flex; align-items: center; gap: 10px; }
        .save-status { font-size: 0.65rem; color: var(--success); font-weight: 700; background: rgba(16, 185, 129, 0.1); padding: 4px 10px; border-radius: 20px; }
        
        .theme-toggle {
            background: var(--border); border: none; width: 35px; height: 35px;
            border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
        }

        /* Responsive Layout */
        .container { width: 100%; max-width: 1000px; margin: 0 auto; padding: 1.5rem; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 4px 10px -2px rgba(0,0,0,0.05); }
        
        .grid-layout { display: grid; grid-template-columns: 1fr; gap: 1rem; }
        @media (min-width: 768px) { .grid-layout { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .grid-layout { grid-template-columns: repeat(3, 1fr); } }

        /* Form Elements */
        label { display: block; font-size: 0.7rem; font-weight: 800; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; }
        input[type="text"], textarea {
            width: 100%; padding: 0.8rem; border: 1px solid var(--border);
            border-radius: 12px; font-size: 0.95rem; background: var(--bg); color: var(--text-main);
        }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; }

        /* Chapter Cards */
        .chapter-card { border: 2px solid var(--border); border-radius: 20px; background: var(--card); padding: 1.5rem; margin-bottom: 2rem; position: relative; }
        .ch-badge { font-size: 0.65rem; font-weight: 800; padding: 4px 8px; border-radius: 6px; display: inline-block; margin-bottom: 12px; }
        
        .block-item { 
            background: var(--block-bg); border-radius: 12px; padding: 1rem; margin-top: 1rem; 
            border-left: 4px solid var(--primary); position: relative;
        }
        .btn-del-block { position: absolute; top: 8px; right: 8px; background: none; border: none; color: var(--danger); cursor: pointer; }

        /* Floating Action Bar (Mobile First) */
        .action-bar {
            position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
            background: #0f172a; padding: 0.8rem 1rem; border-radius: 100px;
            display: flex; gap: 8px; z-index: 1000; width: 90%; max-width: 500px;
            justify-content: space-around; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .btn {
            padding: 0.7rem 1rem; border-radius: 50px; border: none;
            font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 0.8rem;
            display: flex; align-items: center; gap: 6px; color: white; white-space: nowrap;
        }
        .btn-p { background: var(--primary); }
        .btn-s { background: #334155; }
        .btn-success { background: var(--success); }

        /* Loader */
        #loader {
            display: none; position: fixed; inset: 0; background: var(--nav-bg);
            z-index: 9999; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .btn span { display: none; } /* Sembunyikan teks di tombol agar muat di HP */
            .btn { padding: 0.8rem; }
            .chapter-card { padding: 1rem; }
        }
    </style>
</head>
<body class="light-mode">

<nav>
    <div class="logo">Kazue Studio</div>
    <div class="nav-controls">
        <div id="save-status" class="save-status">Tersimpan</div>
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-icon">🌙</button>
    </div>
</nav>

<div class="container">
    <!-- Metadata -->
    <div class="card">
        <label>Judul Novel</label>
        <input type="text" id="title" class="save-local" placeholder="Judul Mahakarya...">
        
        <div class="grid-layout" style="margin-top: 15px;">
            <div><label>Penulis</label><input type="text" id="author" class="save-local"></div>
            <div><label>Ilustrator</label><input type="text" id="illustrator" class="save-local"></div>
            <div>
                <label>Cover (File/URL)</label>
                <input type="file" id="cover-file" accept="image/*" style="font-size: 0.7rem;">
                <input type="text" id="cover-url" class="save-local" placeholder="URL Gambar...">
            </div>
        </div>
        
        <label style="margin-top:15px;">Sinopsis</label>
        <textarea id="synopsis" class="save-local" style="height: 100px;"></textarea>
    </div>

    <div id="chapters-list"></div>
</div>

<!-- Navigasi Bawah -->
<div class="action-bar">
    <button class="btn btn-p" onclick="addChapter('biasa')">📑 <span>+ Bab Teks</span></button>
    <button class="btn btn-s" onclick="addChapter('ilustrasi')">🖼️ <span>+ Ilustrasi</span></button>
    <button class="btn btn-success" onclick="generatePDF()">🚀 <span>Download</span></button>
</div>

<div id="loader"><div class="spinner"></div><p style="margin-top:15px; font-weight:700;">Menyusun Novel Anda...</p></div>

<script>
    const { jsPDF } = window.jspdf;

    // --- Theme Switcher ---
    function toggleTheme() {
        const body = document.body;
        const icon = document.getElementById('theme-icon');
        if(body.classList.contains('dark-mode')) {
            body.classList.replace('dark-mode', 'light-mode');
            icon.innerText = '🌙';
            localStorage.setItem('kazue_theme', 'light');
        } else {
            body.classList.replace('light-mode', 'dark-mode');
            icon.innerText = '☀️';
            localStorage.setItem('kazue_theme', 'dark');
        }
    }

    // --- Autosave ---
    function saveAll() {
        const data = {
            title: document.getElementById('title').value,
            author: document.getElementById('author').value,
            illustrator: document.getElementById('illustrator').value,
            synopsis: document.getElementById('synopsis').value,
            coverUrl: document.getElementById('cover-url').value,
            chapters: []
        };
        document.querySelectorAll('.chapter-card').forEach(card => {
            const ch = { type: card.dataset.type, title: card.querySelector('.ch-title').value, blocks: [] };
            card.querySelectorAll('.block-item').forEach(block => {
                ch.blocks.push({ type: block.dataset.type, text: block.querySelector('textarea')?.value || '', url: block.querySelector('.block-url')?.value || '' });
            });
            if(ch.type === 'ilustrasi') ch.fullUrl = card.querySelector('.url-full')?.value || '';
            data.chapters.push(ch);
        });
        localStorage.setItem('kazue_pro_draft', JSON.stringify(data));
        document.getElementById('save-status').innerText = "Tersimpan: " + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    }

    function loadAll() {
        // Theme Load
        const savedTheme = localStorage.getItem('kazue_theme');
        if(savedTheme === 'dark') toggleTheme();

        const saved = localStorage.getItem('kazue_pro_draft');
        if (!saved) return;
        const data = JSON.parse(saved);
        document.getElementById('title').value = data.title || '';
        document.getElementById('author').value = data.author || '';
        document.getElementById('illustrator').value = data.illustrator || '';
        document.getElementById('synopsis').value = data.synopsis || '';
        document.getElementById('cover-url').value = data.coverUrl || '';
        data.chapters.forEach(ch => addChapter(ch.type, ch));
    }

    // --- UI Chapter & Block ---
    function addChapter(type, saved = null) {
        const list = document.getElementById('chapters-list');
        const id = Date.now() + Math.random();
        const div = document.createElement('div');
        div.className = 'chapter-card';
        div.id = `ch-${id}`;
        div.dataset.type = type;

        let html = `<button style="position:absolute; top:15px; right:15px; background:none; border:none; color:var(--danger); cursor:pointer; font-size:1.2rem;" onclick="document.getElementById('ch-${id}').remove(); saveAll();">✕</button>`;
        if(type === 'biasa') {
            html += `<span class="ch-badge" style="background:rgba(99, 102, 241, 0.1); color:var(--primary);">Bab Teks</span>
                    <input type="text" class="ch-title save-local" placeholder="Judul Bab..." value="${saved?.title || ''}">
                    <div class="blocks-container" id="blocks-${id}"></div>
                    <div style="margin-top:10px; display:flex; gap:8px;">
                        <button class="btn btn-s" style="padding:5px 12px; font-size:0.7rem;" onclick="addBlock('${id}', 'text')">+ Teks</button>
                        <button class="btn btn-s" style="padding:5px 12px; font-size:0.7rem;" onclick="addBlock('${id}', 'image')">+ Gambar (Full)</button>
                    </div>`;
        } else {
            html += `<span class="ch-badge" style="background:rgba(217, 119, 6, 0.1); color:#d97706;">Ilustrasi Fullpage</span>
                    <input type="text" class="ch-title save-local" placeholder="Nama Ilustrasi..." value="${saved?.title || ''}">
                    <input type="file" class="file-full" accept="image/*" style="margin-top:10px; font-size:0.7rem;">
                    <input type="text" class="url-full save-local" placeholder="URL Gambar..." value="${saved?.fullUrl || ''}">`;
        }
        div.innerHTML = html;
        list.appendChild(div);
        if(saved && saved.blocks) saved.blocks.forEach(b => addBlock(id, b.type, b));
        else if(type === 'biasa') addBlock(id, 'text');
        div.querySelectorAll('.save-local').forEach(el => el.addEventListener('input', saveAll));
    }

    function addBlock(chId, type, saved = null) {
        const cont = document.getElementById(`blocks-${chId}`);
        const div = document.createElement('div');
        div.className = 'block-item';
        div.dataset.type = type;
        div.innerHTML = type === 'text' ? 
            `<button class="btn-del-block" onclick="this.parentElement.remove(); saveAll();">✕</button><textarea class="save-local" placeholder="Tulis cerita...">${saved?.text || ''}</textarea>` :
            `<button class="btn-del-block" onclick="this.parentElement.remove(); saveAll();">✕</button><label>Gambar Full-Page (File/URL)</label><input type="file" class="block-file" accept="image/*"><input type="text" class="block-url save-local" placeholder="Atau Link..." value="${saved?.url || ''}">`;
        cont.appendChild(div);
        div.querySelectorAll('.save-local').forEach(el => el.addEventListener('input', saveAll));
    }

    // --- PDF Engine (Full-Page No Margin) ---
    async function getImg(fileEl, url) {
        if (fileEl?.files[0]) return new Promise(r => { const reader = new FileReader(); reader.onload = e => r(e.target.result); reader.readAsDataURL(fileEl.files[0]); });
        if (url) try { const res = await fetch(url); const b = await res.blob(); return new Promise(r => { const rd = new FileReader(); rd.onload = e => r(e.target.result); rd.readAsDataURL(b); }); } catch(e) { return null; }
        return null;
    }

    async function getDim(src) { return new Promise(r => { const i = new Image(); i.onload = () => r({ w: i.width, h: i.height }); i.src = src; }); }

    async function generatePDF() {
        document.getElementById('loader').style.display = 'flex';
        const doc = new jsPDF({ unit: 'px', hotfixes: ["px_scaling"] });
        doc.deletePage(1);

        // 1. Cover
        const cover = await getImg(document.getElementById('cover-file'), document.getElementById('cover-url').value);
        if(cover) { const d = await getDim(cover); doc.addPage([d.w, d.h], d.w > d.h ? 'l' : 'p'); doc.addImage(cover, 'JPEG', 0, 0, d.w, d.h, undefined, 'MEDIUM'); }

        // 2. Metadata Page
        doc.addPage([600, 850], 'p');
        let curY = 80; doc.setFontSize(24); doc.setFont("helvetica", "bold");
        const titleL = doc.splitTextToSize(document.getElementById('title').value || "Novel", 500);
        titleL.forEach(l => { doc.text(l, 300, curY, { align: 'center' }); curY += 30; });
        
        doc.setFontSize(10); doc.setFont("helvetica", "normal"); curY += 20;
        doc.text(`Penulis: ${document.getElementById('author').value || "-"} | Ilustrator: ${document.getElementById('illustrator').value || "-"}`, 300, curY, { align: 'center' }); curY += 50;
        doc.setFont("helvetica", "bold"); doc.text("SINOPSIS", 40, curY); curY += 20;
        doc.setFont("helvetica", "normal");
        const sLines = doc.splitTextToSize(document.getElementById('synopsis').value || "", 520);
        sLines.forEach(l => { if(curY > 800) { doc.addPage(); curY = 40; } doc.text(l, 40, curY); curY += 15; });

        // 3. Chapters & Blocks Flow
        for (const card of document.querySelectorAll('.chapter-card')) {
            const type = card.dataset.type;
            const title = card.querySelector('.ch-title').value;

            if(type === 'ilustrasi') {
                const src = await getImg(card.querySelector('.file-full'), card.querySelector('.url-full').value);
                if(src) { const d = await getDim(src); doc.addPage([d.w, d.h], d.w > d.h ? 'l' : 'p'); doc.addImage(src, 'JPEG', 0, 0, d.w, d.h, undefined, 'MEDIUM'); }
            } else {
                // Bab Teks Seamless
                doc.addPage([600, 850], 'p'); curY = 60;
                doc.setFontSize(18); doc.setFont("helvetica", "bold");
                doc.text(title || "Bab Baru", 300, curY, { align: 'center' }); curY += 50;
                doc.setFontSize(11); doc.setFont("helvetica", "normal");

                for (const block of card.querySelectorAll('.block-item')) {
                    if(block.dataset.type === 'text') {
                        const lines = doc.splitTextToSize(block.querySelector('textarea').value, 520);
                        lines.forEach(line => {
                            if(curY > 810) { doc.addPage([600, 850], 'p'); curY = 50; }
                            doc.text(line, 40, curY); curY += 16;
                        });
                        curY += 10;
                    } else {
                        // Gambar dalam Bab Teks (FULL PAGE NO MARGIN)
                        const img = await getImg(block.querySelector('.block-file'), block.querySelector('.block-url').value);
                        if(img) {
                            const d = await getDim(img);
                            doc.addPage([d.w, d.h], d.w > d.h ? 'l' : 'p');
                            doc.addImage(img, 'JPEG', 0, 0, d.w, d.h, undefined, 'MEDIUM');
                            // Kembali ke format halaman teks
                            doc.addPage([600, 850], 'p'); curY = 50;
                        }
                    }
                }
            }
        }
        doc.save((document.getElementById('title').value || 'novel') + '.pdf');
        document.getElementById('loader').style.display = 'none';
    }
    window.onload = loadAll;
</script>
</body>
</html>
