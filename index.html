<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kazue Studio V4 - Ultra Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #020617; color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .novel-font { font-family: 'Crimson Pro', serif; }
        #loader { display: none; background: rgba(0,0,0,0.9); position: fixed; inset: 0; z-index: 9999; align-items: center; justify-content: center; flex-direction: column; }
        input, textarea { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; }
        .btn-click { cursor: pointer; transition: transform 0.1s; position: relative; z-index: 10; }
        .btn-click:active { transform: scale(0.95); }
        .card-bg { background: rgba(15, 23, 42, 0.9); border: 1px solid #1e293b; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div id="loader">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-blue-500 mb-4"></div>
        <p id="loaderText" class="text-blue-400 font-bold text-[10px] uppercase tracking-widest">Processing...</p>
    </div>

    <div class="max-w-6xl mx-auto p-4 lg:p-10">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-6 card-bg p-6 rounded-[2.5rem]">
            <div class="text-center md:text-left">
                <h1 class="text-4xl font-black italic tracking-tighter">KAZUE <span class="text-blue-600">STUDIO</span></h1>
                <p id="saveStatus" class="text-[9px] text-slate-500 uppercase font-bold mt-1 tracking-widest">System Ready</p>
            </div>
            <div class="flex gap-2">
                <button onclick="resetStudio()" class="btn-click bg-slate-800 text-white px-5 py-3 rounded-xl text-[10px] font-bold uppercase">Reset</button>
                <button onclick="generatePDF()" class="btn-click bg-blue-600 text-white font-black px-8 py-3 rounded-xl text-xs uppercase shadow-lg">Generate PDF</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- PANEL KIRI -->
            <div class="lg:col-span-4 space-y-6">
                <!-- Cover -->
                <div class="card-bg p-6 rounded-[2rem] shadow-xl">
                    <h2 class="text-[10px] font-black text-blue-500 uppercase mb-4 tracking-widest">Main Cover</h2>
                    <div id="coverPreview" class="hidden mb-4 relative rounded-xl overflow-hidden border border-slate-700">
                        <img id="imgCover" src="#" class="w-full h-auto">
                        <button onclick="removeCover()" class="absolute top-2 right-2 bg-red-600 text-white w-7 h-7 rounded-full text-xs">×</button>
                    </div>
                    <label class="btn-click flex flex-col items-center justify-center w-full h-20 border-2 border-dashed border-slate-800 rounded-2xl">
                        <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Set Cover Image</p>
                        <input type="file" id="coverInput" class="hidden" accept="image/*" onchange="handleFile(event, 'cover')" />
                    </label>
                </div>

                <!-- Add Content -->
                <div class="card-bg p-6 rounded-[2rem] shadow-xl">
                    <h2 class="text-[10px] font-black text-blue-500 uppercase mb-4 tracking-widest">Add Content</h2>
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <button onclick="addBlock('header')" class="btn-click bg-slate-100 text-slate-900 h-14 rounded-xl font-black uppercase text-[10px]">Judul Bab</button>
                        <button onclick="addBlock('text')" class="btn-click bg-blue-600 text-white h-14 rounded-xl font-black uppercase text-[10px]">Paragraf</button>
                        <button onclick="document.getElementById('bulkImg').click()" class="btn-click col-span-2 border border-slate-700 h-12 rounded-xl text-[9px] font-bold text-slate-400 uppercase tracking-widest">+ Upload Ilustrasi</button>
                        <input type="file" id="bulkImg" multiple accept="image/*" class="hidden" onchange="handleFile(event, 'bulk')">
                    </div>
                    <div class="flex gap-1">
                        <input type="text" id="urlInput" placeholder="Image URL..." class="flex-1 p-2 rounded-lg text-[10px]">
                        <button onclick="addImageFromUrl()" class="btn-click bg-slate-800 px-3 rounded-lg text-[9px] font-bold">ADD</button>
                    </div>
                </div>

                <!-- Info Buku -->
                <div class="card-bg p-6 rounded-[2rem] space-y-3">
                    <h2 class="text-[10px] font-black text-blue-500 uppercase mb-2 tracking-widest">Metadata</h2>
                    <input type="text" id="title" oninput="autoSave()" placeholder="Judul Novel" class="p-3 rounded-xl text-xs font-bold">
                    <input type="text" id="author" oninput="autoSave()" placeholder="Penulis" class="p-3 rounded-xl text-xs">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="genre" oninput="autoSave()" placeholder="Genre" class="p-3 rounded-xl text-[10px]">
                        <input type="text" id="publisher" oninput="autoSave()" placeholder="Penerbit" class="p-3 rounded-xl text-[10px]">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="illustrator" oninput="autoSave()" placeholder="Ilustrator" class="p-3 rounded-xl text-[10px]">
                        <input type="text" id="translator" oninput="autoSave()" placeholder="Penerjemah" class="p-3 rounded-xl text-[10px]">
                    </div>
                    <input type="text" id="serial" oninput="autoSave()" placeholder="ISBN / Seri" class="p-3 rounded-xl text-[10px]">
                    <textarea id="synopsis" oninput="autoSave()" rows="3" placeholder="Sinopsis..." class="p-3 rounded-xl text-[10px] resize-none"></textarea>
                </div>
            </div>

            <!-- EDITOR -->
            <div class="lg:col-span-8">
                <div class="card-bg min-h-[600px] rounded-[2.5rem] p-6 lg:p-10 relative">
                    <h2 class="text-xl font-black italic mb-6 border-b border-slate-800 pb-4 uppercase tracking-tighter">Draft Canvas</h2>
                    <div id="editorSpace" class="space-y-6">
                        <div id="emptyState" class="text-center py-40 opacity-10 uppercase tracking-widest text-xs font-black">Studio Ready</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { jsPDF } = window.jspdf;
        let coverBase64 = null;
        let blocks = [];
        let db;

        // DB INIT
        const req = indexedDB.open("KazueFinalDB_V4", 1);
        req.onupgradeneeded = e => { e.target.result.createObjectStore("novel", { keyPath: "id" }); };
        req.onsuccess = e => { db = e.target.result; loadProj(); };

        function autoSave() {
            if(!db) return;
            const data = {
                id: "active", title: document.getElementById('title').value,
                author: document.getElementById('author').value, genre: document.getElementById('genre').value,
                publisher: document.getElementById('publisher').value, illustrator: document.getElementById('illustrator').value,
                translator: document.getElementById('translator').value, serial: document.getElementById('serial').value,
                synopsis: document.getElementById('synopsis').value, cover: coverBase64, blocks: blocks
            };
            const tx = db.transaction("novel", "readwrite");
            tx.objectStore("novel").put(data);
            document.getElementById('saveStatus').innerText = "Syncing...";
            tx.oncomplete = () => { document.getElementById('saveStatus').innerText = "Autosaved"; };
        }

        function loadProj() {
            const tx = db.transaction("novel", "readonly");
            const req = tx.objectStore("novel").get("active");
            req.onsuccess = () => {
                const d = req.result; if(!d) return;
                document.getElementById('title').value = d.title || "";
                document.getElementById('author').value = d.author || "";
                document.getElementById('genre').value = d.genre || "";
                document.getElementById('publisher').value = d.publisher || "";
                document.getElementById('illustrator').value = d.illustrator || "";
                document.getElementById('translator').value = d.translator || "";
                document.getElementById('serial').value = d.serial || "";
                document.getElementById('synopsis').value = d.synopsis || "";
                if(d.cover) { coverBase64 = d.cover; document.getElementById('imgCover').src = d.cover; document.getElementById('coverPreview').classList.remove('hidden'); }
                blocks = d.blocks || [];
                render();
            };
        }

        function resetStudio() { if(confirm("Reset semua data?")) { indexedDB.deleteDatabase("KazueFinalDB_V4"); location.reload(); } }

        // COMPRESSION
        async function compressImg(base64) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if (w > 1500 || h > 1500) { const r = Math.min(1500/w, 1500/h); w *= r; h *= r; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
            });
        }

        // HANDLERS
        async function handleFile(e, mode) {
            const files = Array.from(e.target.files);
            if(!files.length) return;
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';
            try {
                // Sequential processing (One by one) to prevent crash
                for(const file of files) {
                    const b64 = await new Promise(r => {
                        const fr = new FileReader();
                        fr.onload = ev => r(ev.target.result);
                        fr.readAsDataURL(file);
                    });
                    const comp = await compressImg(b64);
                    if(mode === 'cover') {
                        coverBase64 = comp;
                        document.getElementById('imgCover').src = comp;
                        document.getElementById('coverPreview').classList.remove('hidden');
                    } else {
                        blocks.push({ id: Date.now() + Math.random(), type: 'image', value: comp });
                    }
                }
                render(); autoSave();
            } catch(e) { alert("Error processing image."); }
            finally { loader.style.display = 'none'; }
        }

        async function addImageFromUrl() {
            const url = document.getElementById('urlInput').value;
            if(!url) return;
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';
            try {
                const res = await fetch(url);
                const blob = await res.blob();
                const b64 = await new Promise(r => {
                    const fr = new FileReader();
                    fr.onloadend = () => r(fr.result);
                    fr.readAsDataURL(blob);
                });
                const comp = await compressImg(b64);
                blocks.push({ id: Date.now() + Math.random(), type: 'image', value: comp });
                render(); autoSave();
                document.getElementById('urlInput').value = '';
            } catch(e) { alert("CORS Error / Invalid URL"); }
            finally { loader.style.display = 'none'; }
        }

        function removeCover() { coverBase64 = null; document.getElementById('coverPreview').classList.add('hidden'); autoSave(); }
        function addBlock(type) { blocks.push({ id: Date.now() + Math.random(), type, value: "" }); render(); autoSave(); }
        function updateBlock(id, val) { const idx = blocks.findIndex(b => b.id === id); blocks[idx].value = val; autoSave(); }
        function deleteBlock(id) { blocks = blocks.filter(b => b.id !== id); render(); autoSave(); }

        function render() {
            const space = document.getElementById('editorSpace');
            space.innerHTML = '';
            document.getElementById('emptyState').style.display = blocks.length ? 'none' : 'block';
            blocks.forEach((b, i) => {
                const div = document.createElement('div');
                div.className = "p-6 rounded-2xl bg-slate-950/50 border border-slate-800 relative group";
                let input = b.type === 'header' ? 
                    `<input type="text" class="w-full bg-transparent font-black text-xl outline-none" value="${b.value}" oninput="updateBlock(${b.id}, this.value)" placeholder="JUDUL BAB...">` :
                    b.type === 'text' ? 
                    `<textarea class="w-full bg-transparent novel-font text-lg outline-none resize-none" rows="5" oninput="updateBlock(${b.id}, this.value)" placeholder="Cerita...">${b.value}</textarea>` :
                    `<div class="text-center"><img src="${b.value}" class="max-h-64 rounded-xl mx-auto border border-slate-800"></div>`;
                
                div.innerHTML = `<div class="flex justify-between mb-2 text-[8px] font-black uppercase text-slate-700"><span>#${i+1} - ${b.type}</span><button onclick="deleteBlock(${b.id})" class="text-red-500 font-bold uppercase transition">Hapus</button></div>${input}`;
                space.appendChild(div);
            });
        }

        // GENERATOR
        async function generatePDF() {
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';
            try {
                const doc = new jsPDF({ unit: 'mm', format: 'a4', compress: true });
                const pW = 210, pH = 297, margin = 25, cW = pW - (margin * 2);

                if (coverBase64) {
                    const p = doc.getImageProperties(coverBase64);
                    const w = p.width * 0.2645, h = p.height * 0.2645;
                    doc.deletePage(1); doc.addPage([w, h], h > w ? 'p' : 'l');
                    doc.addImage(coverBase64, 'JPEG', 0, 0, w, h, undefined, 'FAST');
                }

                doc.addPage('a4', 'p');
                doc.setFont("times", "bold").setFontSize(28).text((document.getElementById('title').value || "NOVEL").toUpperCase(), pW/2, 60, { align: 'center' });
                doc.setFontSize(14).setFont("times", "normal");
                let y = 80;
                [['Penulis','author'],['Genre','genre'],['Illustrator','illustrator'],['Penerjemah','translator'],['Penerbit','publisher'],['Seri','serial']].forEach(m => {
                    const v = document.getElementById(m[1]).value; if(v) { doc.text(`${m[0]}: ${v}`, pW/2, y, { align: 'center' }); y += 8; }
                });

                const syn = document.getElementById('synopsis').value;
                if(syn) { doc.addPage('a4', 'p'); doc.setFont("times", "bold").setFontSize(18).text("Sinopsis", margin, 40); doc.setFont("times", "italic").setFontSize(12).text(doc.splitTextToSize(syn, cW), margin, 50); }

                doc.addPage('a4', 'p'); let curY = 30;
                for (const b of blocks) {
                    if (b.type === 'header') {
                        if (curY > 50) { doc.addPage('a4', 'p'); curY = 30; }
                        doc.setFont("times", "bold").setFontSize(22).text(b.value, margin, curY); curY += 15;
                    } else if (b.type === 'text') {
                        doc.setFont("times", "normal").setFontSize(12);
                        const lines = doc.splitTextToSize(b.value, cW);
                        const h = lines.length * 7;
                        if (curY + h > pH - margin) { doc.addPage('a4', 'p'); curY = 30; }
                        doc.text(lines, margin, curY); curY += h + 6;
                    } else if (b.type === 'image') {
                        const p = doc.getImageProperties(b.value);
                        const w = p.width * 0.2645, h = p.height * 0.2645;
                        doc.addPage([w, h], h > w ? 'p' : 'l'); doc.addImage(b.value, 'JPEG', 0, 0, w, h, undefined, 'FAST');
                        doc.addPage('a4', 'p'); curY = 30;
                    }
                }

                const total = doc.internal.getNumberOfPages();
                for(let i = 1; i <= total; i++) {
                    doc.setPage(i); if(Math.round(doc.internal.pageSize.getWidth()) === 210) {
                        doc.setFontSize(8).setFont("times", "italic").text("- " + i + " -", pW/2, pH - 8, { align: "center" });
                    }
                }
                doc.save(`${document.getElementById('title').value || 'kazue_studio'}.pdf`);
            } catch(e) { alert("Generate failed."); }
            finally { loader.style.display = 'none'; }
        }
    </script>
</body>
</html>
